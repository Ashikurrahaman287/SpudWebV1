kind = "web"
previewPath = "/"
title = "SpudBlocks"
version = "1.0.0"
id = "artifacts/spudblocks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18310

[services.development]
run = "pnpm --filter @workspace/spudblocks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spudblocks", "run", "build" ]
publicDir = "artifacts/spudblocks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18310"
BASE_PATH = "/"
