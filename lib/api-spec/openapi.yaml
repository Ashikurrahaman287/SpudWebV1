openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact form submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contacts:
    post:
      operationId: createContact
      tags: [contacts]
      summary: Submit a contact form entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
        "400":
          description: Validation error
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contact submissions (admin)
      parameters:
        - in: header
          name: x-admin-token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"
        "401":
          description: Unauthorized
  /contacts/{id}:
    patch:
      operationId: patchContactStatus
      tags: [contacts]
      summary: Update a submission's status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-admin-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a submission (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-admin-token
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        telegram:
          type: string
        company:
          type: string
        website:
          type: string
        stage:
          type: string
        budget:
          type: string
        message:
          type: string
          minLength: 1
        source:
          type: string
    UpdateStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, contacted, qualified, closed, rejected]
    ContactSubmission:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - telegram
        - company
        - website
        - stage
        - budget
        - message
        - source
        - status
        - submittedAt
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        telegram:
          type: string
        company:
          type: string
        website:
          type: string
        stage:
          type: string
        budget:
          type: string
        message:
          type: string
        source:
          type: string
        status:
          type: string
          enum: [new, contacted, qualified, closed, rejected]
        submittedAt:
          type: string
          format: date-time
